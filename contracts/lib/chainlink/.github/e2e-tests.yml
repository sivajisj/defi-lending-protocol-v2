# This file specifies the GitHub runner for each E2E test and is utilized by all E2E CI workflows.
#
# Each entry in this file includes the following:
# - The GitHub runner (runs_on field) that will execute tests.
# - The tests that will be run by the runner.
# - The triggers (e.g., Run PR E2E Tests, Nightly E2E Tests) that should trigger these tests.
#
runner-test-matrix:
  # START: CCIPv1.6 tests

  - id: smoke/ccip/ccip_reorg_test.go:LessThanFinalityTests
    path: integration-tests/smoke/ccip/ccip_reorg_test.go
    test_env_type: docker
    runs_on: ubuntu-latest
    triggers:
      - Nightly E2E Tests
      - Push E2E CCIP Tests
      - Workflow Dispatch E2E CCIP Tests
    test_cmd: |
      cd integration-tests/smoke/ccip && \
      gotestsum \
        --junitfile=/tmp/junit.xml \
        --jsonfile=/tmp/gotest.log \
        --format=github-actions \
        -- -v -run "Test_CCIPReorg_BelowFinality_OnSource|Test_CCIPReorg_BelowFinality_OnDest" ccip_reorg_test.go -timeout 25m -parallel=1 -count=1
    pyroscope_env: ci-smoke-ccipv1_6-evm-simulated
    test_env_vars:
      E2E_TEST_SELECTED_NETWORK: SIMULATED_1_DEEPER_FINALITY,SIMULATED_2_DEEPER_FINALITY
      E2E_JD_VERSION: 0.9.0
      CCIP_V16_TEST_ENV: docker

  - id: smoke/ccip/ccip_reorg_test.go:GreaterThanFinalityTests
